name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Hard-Reset Signing and Dummy Identity
        run: |
          # 1. Inject Dummy Team and strip requirements from project files
          find . -name "project.pbxproj" -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.sovereign.archive.mobile;/g' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/buildSettings = {/a \
          				ProvisioningStyle = Manual; \
          				DEVELOPMENT_TEAM = "1234567890";' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' {} +
          
          # Inject rules into xcconfig files for ultimate persistence
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Surgical Podfile Injection
        run: |
          # 2. Let flutter generate the standard Podfile first
          flutter build ios --release --no-codesign --config-only || true
          
          # Use 'sed' to surgically inject our rules into the existing post_install block
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                end' ios/Podfile

      - name: Build with Injected Xcode Command (The Masterworks Bypass)
        run: |
          # 3. Use xcodebuild directly with Flutter environment variables
          cd ios
          
          # Extract flutter environment from Generated.xcconfig
          while read -r line; do
            export "$line"
          done < <(grep "=" Flutter/Generated.xcconfig | sed 's/ //g')
          
          # Build specifically for iphoneos with signing forced OFF
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM="1234567890" \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO

      - name: Package IPA manually
        run: |
          # 4. Find the generated .app and package it into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
