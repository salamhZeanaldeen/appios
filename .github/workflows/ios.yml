name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Hard-Reset Signing and Bundle ID
        run: |
          # 1. Force a unique Bundle ID and strip all signing requirements
          find . -name "project.pbxproj" -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.sovereign.archive.mobile;/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' {} +
          
          # Inject rules into xcconfig files for ultimate persistence
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Build with Direct Xcode Command (The Ultimate Bypass)
        run: |
          # 2. Run flutter build ios only to generate frameworks/assets, ignore failure
          flutter build ios --release --no-codesign || true

          # 3. Manually trigger xcodebuild to finish the task without signing checks
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM=""

      - name: Package IPA manually
        run: |
          # 4. Find the generated .app and package it into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
