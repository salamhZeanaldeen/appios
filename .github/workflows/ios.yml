name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Hard-Reset Signing and Dummy Identity
        run: |
          # 1. Clean up and force Manual Style/Dummy Team
          find . -name "project.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' {} +
          find . -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = [^;]*;//g' {} +
          find . -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = [^;]*;//g' {} +
          find . -name "project.pbxproj" -exec sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = "1234567890";\n\t\t\t\tProvisioningStyle = Manual;/g' {} +
          
          # 2. Force Bundle ID and No-Sign xcconfig
          find . -name "project.pbxproj" -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.sovereign.archive.mobile;/g' {} +
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Surgical Podfile Injection and Install
        run: |
          # 3. Generate standard Podfile and inject No-Sign rules
          flutter build ios --release --no-codesign --config-only
          
          # Inject No-Sign rules into Podfile
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                end' ios/Podfile
          
          # CRITICAL: Install CocoaPods to link plugins correctly
          cd ios && pod install

      - name: Direct Xcode Orchestration (The Deep Bypass v18)
        run: |
          # 4. Build directly with xcodebuild, manually passing Flutter environment
          
          # Manually grab critical Flutter paths from Generated.xcconfig
          # Using absolute paths to avoid confusion
          CONFIG_FILE="ios/Flutter/Generated.xcconfig"
          if [ ! -f "$CONFIG_FILE" ]; then echo "Error: Generated.xcconfig not found"; exit 1; fi
          
          export FLUTTER_ROOT=$(grep "FLUTTER_ROOT" "$CONFIG_FILE" | cut -d'=' -f2 | xargs)
          export FLUTTER_APPLICATION_PATH=$(grep "FLUTTER_APPLICATION_PATH" "$CONFIG_FILE" | cut -d'=' -f2 | xargs)
          export FLUTTER_TARGET=$(grep "FLUTTER_TARGET" "$CONFIG_FILE" | cut -d'=' -f2 | xargs)
          
          echo "Building with FLUTTER_ROOT: $FLUTTER_ROOT"
          
          cd ios
          # Added -quiet to avoid flooding, but keeping the orchestration
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM="1234567890" \
            FLUTTER_ROOT="$FLUTTER_ROOT" \
            FLUTTER_APPLICATION_PATH="$FLUTTER_APPLICATION_PATH" \
            FLUTTER_TARGET="$FLUTTER_TARGET" \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO COMPILER_INDEX_STORE_ENABLE=NO | xcpretty || true

      - name: Package IPA manually
        run: |
          # 5. Extract the app and zip it
          # We search for the .app file as its location can vary slightly
          mkdir -p build/ios/iphoneos/Payload
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then 
            APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then echo "Error: .app file not found"; exit 1; fi
          
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
