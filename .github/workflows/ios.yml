name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Hard-Reset Signing and Dummy Identity (v15 Master)
        run: |
          # 1. Clean up any existing Team IDs and Styles to avoid duplicates
          find . -name "project.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' {} +
          find . -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = [^;]*;//g' {} +
          find . -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = [^;]*;//g' {} +
          
          # 2. Inject Dummy Team and Manual Style into all buildSettings blocks
          find . -name "project.pbxproj" -exec sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tDEVELOPMENT_TEAM = "1234567890";\n\t\t\t\tProvisioningStyle = Manual;/g' {} +
          
          # 3. Force Bundle ID and Absolute No-Sign in xcconfig
          find . -name "project.pbxproj" -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.sovereign.archive.mobile;/g' {} +
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Surgical Podfile Injection
        run: |
          # 3. Generate Podfile and inject No-Sign rules
          flutter build ios --release --no-codesign --config-only || true
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                end' ios/Podfile

      - name: Build iOS App (.app)
        run: |
          # 4. Use official flutter build - satisfied by our v15 injections
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: Package IPA manually
        run: |
          # 4. Find the generated .app and package it into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
