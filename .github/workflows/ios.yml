name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare and Strip Signing Requirements
        run: |
          # 1. Let flutter do its internal migration/upgrade first (it might fail but it upgrades the files)
          flutter build ios --release --no-codesign --config-only || true
          
          # 2. Now surgically strip everything from the UPGRADED files
          find . -name "*.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' {} +

      - name: Build iOS App (.app)
        run: |
          # 3. Build the iOS app folder with strict 'No Code Signing'
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: Package IPA manually
        run: |
          # A professional trick: Create a Payload folder and zip the .app into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
