name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Matches a stable version for maximum reliability

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS IPA
        run: |
          # Build a release IPA without code signing
          # This allows the user to download and sideload it using AltStore or Sideloadly
          flutter build ipa --release --no-codesign

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/ipa/*.ipa
          retention-days: 7
