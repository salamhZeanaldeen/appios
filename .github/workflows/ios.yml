name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Deep Injection - Disable Signing
        run: |
          # 1. Inject No-Sign rules directly into Xcode Configuration files
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Debug.xcconfig

          # 2. Force Bundle ID and strip any remaining Team IDs
          find . -name "project.pbxproj" -exec sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.sovereign.archive.mobile;/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' {} +

      - name: Build iOS App (.app)
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
        run: |
          # 3. Build with absolute 'No Sign' enforcement
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: Package IPA manually
        run: |
          # A professional trick: Create a Payload folder and zip the .app into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
