name: Build iOS IPA (Sovereign Archive)

on:
  push:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Strip Signing Requirements
        run: |
          # Surgically remove any signing requirements from the project files
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;//g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS App (.app)
        run: |
          # Build the iOS app folder with strict 'No Code Signing' flags
          flutter build ios --release --no-codesign --build-number=1 --build-name=1.0.0

      - name: Package IPA manually
        run: |
          # A professional trick: Create a Payload folder and zip the .app into a .ipa
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -r SovereignArchive.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Archive-iOS
          path: build/ios/iphoneos/SovereignArchive.ipa
          retention-days: 7
